name: Nightly Build

on:
  push:
    branches:
      - develop
  schedule:
    - cron: "0 2 * * *"

jobs:

  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        rid:
          - win-x64
          - linux-x64
          - linux-arm64
          - osx-arm64

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/TreeSync.Cli/TreeSync.Cli.csproj

      - name: Publish (nightly)
        run: |
          dotnet publish src/TreeSync.Cli/TreeSync.Cli.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:Version=nightly-${{ github.run_number }} \
            -o publish/${{ matrix.rid }}

      - name: Package nightly
        run: |
          cd publish/${{ matrix.rid }}
          zip -r ../../TreeSync-nightly-${{ matrix.rid }}.zip .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TreeSync-nightly-${{ matrix.rid }}
          path: TreeSync-nightly-*.zip