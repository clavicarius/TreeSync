name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/TreeSync.Cli/TreeSync.Cli.csproj

      - name: Test
        run: dotnet test -c Release --no-restore