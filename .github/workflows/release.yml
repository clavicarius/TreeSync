name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tags must match vMAJOR.MINOR.PATCH. Got '$tag'."
          }

          $version = $tag.Substring(1)
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "zip_name=TreeSync-$version-win-x64.zip" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore TreeSync.sln

      - name: Build
        run: dotnet build TreeSync.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test TreeSync.sln --configuration Release --no-build

      - name: Publish win-x64
        run: >
          dotnet publish src/TreeSync.Cli/TreeSync.Cli.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:InformationalVersion=${{ steps.version.outputs.version }}
          --output artifacts/publish/win-x64

      - name: Publish linux-x64
        run: >
          dotnet publish src/TreeSync.Cli/TreeSync.Cli.csproj
          --configuration Release
          --runtime linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:InformationalVersion=${{ steps.version.outputs.version }}
          --output artifacts/publish/linux-x64

      - name: Publish .NET variant
        run: >
          dotnet publish src/TreeSync.Cli/TreeSync.Cli.csproj
          --configuration Release
          --self-contained false
          -p:UseAppHost=false
          -p:InformationalVersion=${{ steps.version.outputs.version }}
          --output artifacts/publish/dotnet

      - name: Smoke test linux-x64
        run: ./artifacts/publish/linux-x64/TreeSync --help

      - name: Smoke test .NET
        run: dotnet ./artifacts/publish/dotnet/TreeSync.dll --help

      - name: Create win-x64 ZIP artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/package/win-x64, dist | Out-Null
          Copy-Item artifacts/publish/win-x64/TreeSync.exe artifacts/package/win-x64/
          Copy-Item README.md artifacts/package/win-x64/
          Copy-Item disthelper/deploy.cmd artifacts/package/win-x64/
          Copy-Item disthelper/treesync-ignore.txt artifacts/package/win-x64/
          Copy-Item disthelper/treesync-config.json artifacts/package/win-x64/
          Compress-Archive `
            -Path artifacts/package/win-x64/* `
            -DestinationPath "dist/${{ steps.version.outputs.zip_name }}" `
            -Force

      - name: Create linux-x64 tar.gz artifact
        run: |
          mkdir -p artifacts/package/linux-x64 dist
          cp artifacts/publish/linux-x64/TreeSync artifacts/package/linux-x64/
          cp README.md artifacts/package/linux-x64/
          tar -C artifacts/package/linux-x64 -czf dist/TreeSync-${{ steps.version.outputs.version }}-linux-x64.tar.gz .

      - name: Create .NET ZIP artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/package/dotnet, dist | Out-Null
          Copy-Item artifacts/publish/dotnet/* artifacts/package/dotnet/
          Copy-Item README.md artifacts/package/dotnet/
          Compress-Archive `
            -Path artifacts/package/dotnet/* `
            -DestinationPath "dist/TreeSync-${{ steps.version.outputs.version }}-dotnet.zip" `
            -Force

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TreeSync ${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: false
          body: |
            Draft release for TreeSync ${{ steps.version.outputs.version }}.

            Review release notes manually against CHANGELOG.md before publishing.
          files: |
            dist/${{ steps.version.outputs.zip_name }}
            dist/TreeSync-${{ steps.version.outputs.version }}-linux-x64.tar.gz
            dist/TreeSync-${{ steps.version.outputs.version }}-dotnet.zip
          fail_on_unmatched_files: true
