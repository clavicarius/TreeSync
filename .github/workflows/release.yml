name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # 📦 Node for semantic-release
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 📦 Install semantic-release
      - name: Install dependencies
        run: |
          npm init -y
          npm install semantic-release \
            @semantic-release/changelog \
            @semantic-release/github

      # 🚀 Run release (creates tag + GitHub release)
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          tag="$(git tag --points-at HEAD | sort -V | tail -n 1)"

          if [ -z "$tag" ]; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "published=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build release assets
        if: steps.release.outputs.published == 'true'
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          version="${tag#v}"
          rids=(linux-x64 linux-arm64 win-x64 osx-arm64)

          for rid in "${rids[@]}"; do
            dotnet publish src/TreeSync.Cli/TreeSync.Cli.csproj \
              -c Release \
              -r "$rid" \
              --self-contained true \
              /p:Version="$version" \
              -o "dist/$rid"

            if [[ "$rid" != win-* ]]; then
              chmod +x "dist/$rid/TreeSync"
            fi

            (cd "dist/$rid" && zip -r "../TreeSync-${tag}-${rid}.zip" .)
            sha256sum "dist/TreeSync-${tag}-${rid}.zip" > "dist/TreeSync-${tag}-${rid}.sha256"
          done

      # 📤 Attach binaries to GitHub Release
      - name: Upload Release Assets
        if: steps.release.outputs.published == 'true'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: |
            dist/*.zip
            dist/*.sha256
          fail_on_unmatched_files: true